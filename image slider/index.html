<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider-container">
        <div class="loading-spinner" id="spinner">Loading Dynamic Deck...</div>

        <div class="slider-interface" id="slider-interface" style="display: none;">
            <div class="slider" id="slider">
                <div class="slider-track" id="slider-track">
                </div>

                <button class="nav-arrow prev" aria-label="Previous Slide">&#10094;</button>
                <button class="nav-arrow next" aria-label="Next Slide">&#10095;</button>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
